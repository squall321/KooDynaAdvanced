# 검증 및 단위 변환 헬퍼
# ------------------------------------------------------------------------------
validation:
  dimension_checks:
    unit_cell_thickness_min: 0.2   # mm
    unit_cell_thickness_max: 0.3   # mm
    total_cell_thickness_max: 10.0  # mm
    
  material_checks:
    density_min: 1.0e-10   # ton/mm³
    density_max: 2.0e-8    # ton/mm³
    youngs_modulus_min: 100.0  # MPa
    
  mesh_quality:
    warn_aspect_ratio: 5.0
    error_aspect_ratio: 10.0
    warn_jacobian: 0.6
    
conversion_factors:
  kg_to_ton: 0.001
  m_to_mm: 1000.0
  Pa_to_MPa: 1.0e-6
  J_to_mJ: 1000.0
  W_per_mK_to_W_per_mmK: 0.001
  S_per_m_to_S_per_mm: 0.001
