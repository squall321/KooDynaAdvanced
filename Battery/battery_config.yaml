# ------------------------------------------------------------------------------
# 시나리오 파라미터 (Scenario Parameters)
# ------------------------------------------------------------------------------
# 기존 impact 시나리오와 독립적으로 실행되는 추가 시뮬레이션 시나리오 정의.
# generate_full_model.py 가 이 섹션을 읽어 시나리오별 k-file 세트를 자동 생성.
# ------------------------------------------------------------------------------
scenarios:
  swelling:
    description: "독립 스웰링 시나리오 — 인터칼레이션 변형(가역) + SEI 성장(비가역)"
    n_cycles: 2                  # 시뮬레이션 CC-CV 사이클 수
    c_rate_charge: 0.5           # 충전 C-rate (정격 용량 배수)
    c_rate_discharge: 1.0        # 방전 C-rate
    cv_cutoff_voltage: 4.2       # V — CC→CV 전환 전압 (NMC622 상한)
    cv_cutoff_current_frac: 0.05 # CV 단계 종료 기준: 정격 전류의 5%
    intercalation:
      graphite_cte: 0.035        # 흑연 인터칼레이션 선형 변형률 (SOC=1 → 3.5%)
      nmc_cte: 0.015             # NMC622 인터칼레이션 선형 변형률 (SOC=1 → 1.5%)
      description: |
        인터칼레이션 CTE: SOC 변화에 따른 두께 방향 선형 변형률.
        Graphite: c-축 팽창 3.0-3.7%, NMC622: 1.0-2.0%.
        출처: Zhao et al., J. Electrochem. Soc. 2011.
    sei_growth:
      pre_exponential: 1.5e-6    # A_pre (m/√s) — Ramadass 2004 Arrhenius 계수
      activation_energy: 40000   # J/mol — SEI 성장 활성화 에너지
      initial_thickness: 5.0e-9  # m — 초기 SEI 두께 (≈5 nm, 신품 셀)
      max_thickness: 50.0e-9     # m — 최대 SEI 두께 (≈50 nm, 수명 말기)
      description: |
        SEI 성장 모델: δ(t,T) = δ₀ + A_pre·√t·exp(-Ea/(R·T))
        실온(298K) 단기 시뮬레이션에서는 기여도 무시 가능.
        열화(aging) 연구 및 고온 사이클링에서 유의미.
        출처: Ramadass et al., J. Electrochem. Soc. 2004.
    end_time: 7200.0             # s — 총 시뮬레이션 시간 (≈1 CC-CV full cycle)

  gas:
    description: "독립 가스팽창 시나리오 — 외부 가열 → 가스 발생 → 파우치 팽창/파열"
    heat_source:
      type: "external"           # 외부 히터 방식 (BOUNDARY_HEAT_SET)
      heat_flux_density: 5000.0  # W/m² — 외부 히터 열플럭스 밀도
      ramp_time: 60.0            # s — 0에서 최대까지 경사 상승 시간
      plateau_time: 3600.0       # s — 최대 플럭스 유지 시간
      description: |
        열플럭스 단위 변환: 5000 W/m² = 5.0 mJ/(s·mm²) [mm-ton-s 단위계]
        파우치 외부 세그먼트 집합(SID=3)에 적용 (BOUNDARY_HEAT_SET).
    gas_generation:
      # 하위호환용 flat 필드 (stages가 있으면 무시됨)
      onset_temperature: 373.0   # K — 가스 발생 시작 온도 (100°C)
      activation_energy: 80000   # J/mol — Arrhenius 활성화 에너지
      pre_exponential: 1.0e+12   # 사전 지수 인자 (1/s)
      # 2-stage Arrhenius 모델 (stages 우선)
      stages:
        sei_decomposition:
          onset_temperature: 353.0     # K (80°C) — SEI 분해 시작
          activation_energy: 60000     # J/mol
          pre_exponential: 1.0e6       # 1/s
        electrolyte_decomposition:
          onset_temperature: 423.0     # K (150°C) — 전해질 분해 시작
          activation_energy: 80000     # J/mol
          pre_exponential: 1.0e8       # 1/s
      molecular_weight: 40.0           # g/mol — 분해 가스 평균 분자량 (CO2/H2/C2H4)
      max_rate: 1.0e-7                 # ton/s — 최대 가스 발생율 제한
      description: |
        2-stage Arrhenius: SEI 분해(80°C) + 전해질 분해(150°C).
        FUNCTID 12010 in 12_venting.k, AIRBAG LCID=-12010.
    venting:
      # AIRBAG 열역학 물성 (분해 가스 혼합물)
      cv: 723.0                        # J/kg/K — 정적 비열 (CO2 근사)
      cp: 1004.0                       # J/kg/K — 정압 비열
      initial_temperature: 298.15      # K — 유입 가스 초기 온도
      discharge_coefficient: 0.6       # 오리피스 형상 계수 MU (typical 0.5-0.8)
      atmospheric_pressure: 0.1        # MPa — 대기압 (1 atm)
      atmospheric_density: 1.0e-9      # ton/mm³ — 대기 밀도 (≈ 1.2 kg/m³)
      # 벤팅 면적 vs 절대압력 커브 (safety valve / burst disk 모델)
      vent_area_curve:                  # → LCID 12003
        - [0.0,   0.0]                 # P < 0.2 MPa: 벤팅 없음
        - [0.1,   0.0]
        - [0.2,   0.0]
        - [0.3,   0.2]                 # 안전밸브 개방 시작 (게이지 0.2 MPa)
        - [0.4,   0.8]
        - [0.6,   1.6]                 # 거의 완전 개방
        - [1.0,   2.0]                 # 파우치 파열 — 최대 면적 2 mm²
        - [2.0,   2.0]
        - [5.0,   2.0]
        - [10.0,  2.0]
      description: |
        AIRBAG_SIMPLE_AIRBAG_MODEL: SID=503 파우치 내면 세그먼트.
        벤팅 커브(LCID 12003): 절대압력(MPa) vs 출구면적(mm²).
    end_time: 3600.0             # s — 총 시뮬레이션 시간 (1시간)

